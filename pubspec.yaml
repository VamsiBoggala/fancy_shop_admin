name: fancy_shop_admin
description: "Fancy Shop Admin Panel — Flutter web & mobile admin application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  bloc: ^9.0.0

  # Navigation
  go_router: ^14.8.1

  # UI & Fonts
  shimmer: ^3.0.0
  flutter_svg: ^2.0.15
  lottie: ^3.3.1

  # Utilities
  intl: ^0.20.2
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  http: ^1.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_28pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_28pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_28pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_28pt-Bold.ttf
          weight: 700
